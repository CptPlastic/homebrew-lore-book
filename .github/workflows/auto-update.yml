name: Auto-update lore-book

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest version from PyPI
        id: pypi
        run: |
          VERSION=$(curl -sSf https://pypi.org/pypi/lore-book/json | \
            python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current formula version
        id: formula
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'lore[_-]book-(\\d[\\d.]+)', open('Formula/lore-book.rb').read()); print(m.group(1) if m else '')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.pypi.outputs.version != steps.formula.outputs.version
        env:
          NEW_VERSION: ${{ steps.pypi.outputs.version }}
        run: |
          python3 -m pip install --upgrade pip --quiet
          python3 - <<'PYEOF'
          import urllib.request, json, re, os, subprocess, sys, tempfile

          new_version = os.environ['NEW_VERSION']

          def pypi_json(name, version=None):
              url = (f'https://pypi.org/pypi/{name}/{version}/json' if version
                     else f'https://pypi.org/pypi/{name}/json')
              with urllib.request.urlopen(url) as r:
                  return json.loads(r.read())

          def best_file(files):
              for tag in ['-py3-none-any.whl', '-py2.py3-none-any.whl']:
                  for f in files:
                      if f['filename'].endswith(tag):
                          return f['url'], f['digests']['sha256']
              for f in files:
                  if f['packagetype'] == 'sdist':
                      return f['url'], f['digests']['sha256']
              raise RuntimeError('No suitable file found')

          def normalize(name):
              return re.sub(r'[-_.]+', '-', name).lower()

          # Use pip to resolve the full transitive dependency tree
          report_path = tempfile.mktemp(suffix='.json')
          result = subprocess.run(
              [sys.executable, '-m', 'pip', 'install', '--quiet', '--dry-run',
               '--report', report_path, f'lore-book=={new_version}'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f'pip resolution failed:\n{result.stderr}', file=sys.stderr)
              sys.exit(1)

          with open(report_path) as f:
              report = json.load(f)

          # Build map: normalized_name -> (canonical_name, resolved_version)
          resolved = {}
          for pkg in report['install']:
              meta = pkg['metadata']
              name, version = meta['name'], meta['version']
              norm = normalize(name)
              if norm == 'lore-book':
                  continue
              resolved[norm] = (name, version)

          print(f'Resolved {len(resolved)} deps: {", ".join(sorted(resolved))}')

          # Fetch the best wheel/sdist for each resolved dep
          dep_info = {}
          for norm, (name, version) in resolved.items():
              data = pypi_json(name, version)
              url, sha = best_file(data['urls'])
              dep_info[norm] = {'name': name, 'url': url, 'sha': sha}

          with open('Formula/lore-book.rb') as fh:
              content = fh.read()

          # 1. Update main package url + sha256
          data = pypi_json('lore-book', new_version)
          main_url, main_sha = best_file(data['urls'])
          content = re.sub(
              r'(  url ")[^"]*lore[_-]book-[^"]+"',
              lambda m: m.group(1) + main_url + '"',
              content
          )
          content = re.sub(
              r'(  sha256 ")[^"]+("(\n\n  license))',
              lambda m: m.group(1) + main_sha + m.group(2),
              content
          )

          # 2. Parse current resource names from the formula
          existing = {}  # norm -> res_name as written in formula
          for res_name in re.findall(r'  resource "([^"]+)" do', content):
              existing[normalize(res_name)] = res_name

          stale = sorted(set(existing) - set(dep_info))
          added = sorted(set(dep_info) - set(existing))
          print(f'Stale (removing): {stale or "none"}')
          print(f'New   (adding):   {added or "none"}')

          # 3. Remove stale resources no longer required by the package
          for norm in stale:
              res_name = existing[norm]
              print(f'Removing: {res_name}')
              content = re.sub(
                  r'\n\n  resource "' + re.escape(res_name) + r'" do\n    url "[^"]+"\n    sha256 "[^"]+"\n  end',
                  '',
                  content
              )

          # 4. Update url + sha256 for resources that remain
          for norm, res_name in existing.items():
              if norm not in dep_info:
                  continue
              info = dep_info[norm]
              pattern = (
                  r'(  resource "' + re.escape(res_name) + r'" do\n'
                  r'    url ")[^"]+("\n'
                  r'    sha256 ")[^"]+(")'
              )
              repl = lambda m, u=info['url'], s=info['sha']: m.group(1) + u + m.group(2) + s + m.group(3)
              new_content = re.sub(pattern, repl, content)
              if new_content == content:
                  print(f'WARNING: update did not match for {res_name}')
              content = new_content

          # 5. Add new dependencies the package now requires
          for norm in added:
              info = dep_info[norm]
              print(f'Adding: {info["name"]}')
              block = (
                  f'\n\n  resource "{info["name"]}" do'
                  f'\n    url "{info["url"]}"'
                  f'\n    sha256 "{info["sha"]}"'
                  f'\n  end'
              )
              content = content.replace('\n\n  def install', block + '\n\n  def install', 1)

          with open('Formula/lore-book.rb', 'w') as fh:
              fh.write(content)

          print(f'Done. Formula updated to lore-book {new_version}.')
          PYEOF

      - name: Open pull request
        if: steps.pypi.outputs.version != steps.formula.outputs.version
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "lore-book ${{ steps.pypi.outputs.version }}"
          title: "Update lore-book to ${{ steps.pypi.outputs.version }}"
          body: |
            Automated formula update to lore-book ${{ steps.pypi.outputs.version }}.

            Bumps the main package URL/sha256 and all Python resource blocks via `brew update-python-resources`.
          branch: "bump/lore-book-${{ steps.pypi.outputs.version }}"
          delete-branch: true
