name: Auto-update lore-book

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest version from PyPI
        id: pypi
        run: |
          VERSION=$(curl -sSf https://pypi.org/pypi/lore-book/json | \
            python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current formula version
        id: formula
        run: |
          VERSION=$(sed -n 's|.*lore_book-\([0-9.]*\)\.tar\.gz.*|\1|p' Formula/lore-book.rb | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.pypi.outputs.version != steps.formula.outputs.version
        env:
          NEW_VERSION: ${{ steps.pypi.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, os

          new_version = os.environ['NEW_VERSION']

          def pypi_json(name, version=None):
              url = f'https://pypi.org/pypi/{name}/{version}/json' if version else f'https://pypi.org/pypi/{name}/json'
              with urllib.request.urlopen(url) as r:
                  return json.loads(r.read())

          def best_file(files):
              """Return (url, sha256) preferring py3-none-any wheel, then py2.py3 wheel, then sdist."""
              for tag in ['-py3-none-any.whl', '-py2.py3-none-any.whl']:
                  for f in files:
                      if f['filename'].endswith(tag):
                          return f['url'], f['digests']['sha256']
              for f in files:
                  if f['packagetype'] == 'sdist':
                      return f['url'], f['digests']['sha256']
              raise RuntimeError('No suitable file found')

          with open('Formula/lore-book.rb') as fh:
              content = fh.read()

          # 1. Update main package url + sha256
          data = pypi_json('lore-book', new_version)
          main_url, main_sha = best_file(data['urls'])
          content = re.sub(
              r'(  url ")[^"]*lore_book-[^"]+(")',
              f'\\g<1>{main_url}\\2',
              content
          )
          content = re.sub(
              r'(  sha256 ")[^"]+("(\n\n  license))',
              f'\\g<1>{main_sha}\\2',
              content
          )

          # 2. Update each resource block
          def update_resource(content, res_name, pypi_name, version):
              data = pypi_json(pypi_name, version)
              url, sha = best_file(data['urls'])
              pattern = (
                  r'(  resource "' + re.escape(res_name) + r'" do\n'
                  r'    url ")[^"]+("\n'
                  r'    sha256 ")[^"]+(")'
              )
              replacement = f'\\g<1>{url}\\2\\3{sha}\\4'
              new_content = re.sub(pattern, replacement, content)
              if new_content == content:
                  print(f'WARNING: pattern did not match for {res_name}')
              return new_content

          # Collect current resource versions from the formula
          resource_versions = dict(re.findall(
              r'resource "[^"]+" do\n    url "[^"]*?([a-zA-Z0-9_.-]+-(\d+[.\d]*)[-.](?:tar\.gz|whl))"',
              content
          ))

          # Parse resource name -> (pypi_name, version) from formula
          resources = re.findall(
              r'resource "([^"]+)" do\n    url "[^"]*?/([a-zA-Z0-9_.]+)-(\d[\d.]*?)[-.](?:py3-none-any\.whl|py2\.py3-none-any\.whl|tar\.gz)"',
              content
          )

          pypi_name_map = {
              'annotated-doc': 'annotated-doc',
              'GitPython': 'GitPython',
              'Pygments': 'Pygments',
              'PyYAML': 'PyYAML',
          }

          for res_name, _, version in resources:
              # Derive PyPI package name: resource name takes priority in map, else normalise
              pypi_name = pypi_name_map.get(res_name, res_name)
              content = update_resource(content, res_name, pypi_name, version)

          with open('Formula/lore-book.rb', 'w') as fh:
              fh.write(content)

          print(f'Formula updated to lore-book {new_version}')
          PYEOF

      - name: Open pull request
        if: steps.pypi.outputs.version != steps.formula.outputs.version
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "lore-book ${{ steps.pypi.outputs.version }}"
          title: "Update lore-book to ${{ steps.pypi.outputs.version }}"
          body: |
            Automated formula update to lore-book ${{ steps.pypi.outputs.version }}.

            Bumps the main package URL/sha256 and all Python resource blocks via `brew update-python-resources`.
          branch: "bump/lore-book-${{ steps.pypi.outputs.version }}"
          delete-branch: true
