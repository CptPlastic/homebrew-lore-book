name: Build and Publish Bottles

concurrency:
  group: bottles-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - Formula/lore-book.rb
      - .github/workflows/bottles.yml
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-${{ matrix.os }}-brew-${{ hashFiles('Formula/lore-book.rb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-brew-

      - name: Tap local repository
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          TAP_NAME="${OWNER}/lore-book"
          echo "tap_name=$TAP_NAME" >> "$GITHUB_OUTPUT"
          brew tap "$TAP_NAME" "$GITHUB_WORKSPACE"
        id: tap

      - name: Verify formula is discoverable
        run: |
          set -e
          echo "=== Preflight Checks ==="
          FORMULA_PATH="${GITHUB_WORKSPACE}/Formula/lore-book.rb"
          echo "[1/2] Checking formula file exists..."
          test -f "$FORMULA_PATH" && echo "✓ Formula file: $FORMULA_PATH" || { echo "✗ Formula file NOT found"; exit 1; }
          
          echo "[2/2] Checking tap directory..."
          TAP_DIR="/usr/local/Homebrew/Library/Taps/cptplastic/homebrew-lore-book"
          test -d "$TAP_DIR" && echo "✓ Tap directory exists" || echo "⚠ Tap directory check skipped (will be registered by brew tap)"
          echo "=== Preflight checks complete, proceeding to build ==="

      - name: Compute version and release tag
        id: vars
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'lore[_-]book-(\\d[\\d.]+)', open('Formula/lore-book.rb').read()); print(m.group(1) if m else '')")
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version from Formula/lore-book.rb" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=lore-book-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install formula from source for bottling
        run: brew install --build-bottle "${{ steps.tap.outputs.tap_name }}/lore-book"

      - name: Build bottle + JSON
        run: |
          brew bottle --json \
            --root-url="https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}" \
            "${{ steps.tap.outputs.tap_name }}/lore-book"

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.json

  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and release tag
        id: vars
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'lore[_-]book-(\\d[\\d.]+)', open('Formula/lore-book.rb').read()); print(m.group(1) if m else '')")
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version from Formula/lore-book.rb" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=lore-book-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          path: bottles

      - name: Create or update GitHub release and upload bottles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "lore-book ${{ steps.vars.outputs.version }} bottles" \
              --notes "Automated Homebrew bottles for lore-book ${{ steps.vars.outputs.version }}."
          fi

          find bottles -type f \( -name '*.bottle.tar.gz' -o -name '*.json' \) -print0 | \
            xargs -0 -I{} gh release upload "$TAG" "{}" --clobber

      - name: Merge bottle metadata into formula
        run: |
          JSON_FILES=$(find bottles -type f -name '*.json')
          if [ -z "$JSON_FILES" ]; then
            echo "No bottle JSON files found." >&2
            exit 1
          fi

          brew bottle --merge --write --no-commit --no-all-checks \
            --root-url="https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}" \
            $JSON_FILES

      - name: Commit and push bottle block
        run: |
          if git diff --quiet -- Formula/lore-book.rb; then
            echo "No bottle block changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/lore-book.rb
          git commit -m "formula: update bottle block for ${{ steps.vars.outputs.version }} [skip bottles]"
          git push
